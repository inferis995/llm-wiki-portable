<!DOCTYPE html>
<html lang="it" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Wiki Portable</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-header">
        <div class="logo">W</div>
        <h1>LLM Wiki</h1>
      </div>
      <input type="text" id="search" placeholder="Cerca pagine...">
      <div class="sidebar-pages" id="sidebar-pages"></div>
      <div class="sidebar-footer">
        <span id="page-count">0 pagine</span>
        <span id="link-count">0 link</span>
      </div>
    </div>

    <!-- Main -->
    <div id="main">
      <div id="topbar">
        <button id="toggle-sidebar" title="Toggle sidebar">&#9776;</button>
        <button id="back-btn" style="display:none" title="Torna al grafo">&#8592; Grafo</button>
        <span class="title" id="topbar-title"></span>
        <div class="legend" id="legend"></div>
      </div>
      <div id="graph-container"></div>
      <div id="page-viewer">
        <div class="page-header" id="page-header"></div>
        <div class="prose-wiki" id="page-content"></div>
        <div id="page-links"></div>
      </div>
    </div>
  </div>

  <!-- Librerie (offline) -->
  <script src="lib/d3.min.js"></script>
  <script src="lib/three.min.js"></script>
  <script src="lib/3d-force-graph.min.js"></script>
  <script src="lib/marked.min.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
